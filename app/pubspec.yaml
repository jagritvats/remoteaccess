name: claude_remote
description: "Remote access to your Windows PC from Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  native_dio_adapter: ^1.5.1
  web_socket_channel: ^3.0.2
  flutter_secure_storage: ^9.2.4
  xterm: ^4.0.0
  fl_chart: ^0.70.2
  file_picker: ^8.1.7
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
